name: FinRiskGuard CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_API:    finriskguard-api
  IMAGE_GRADIO: finriskguard-gradio

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true

  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Gradio image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.gradio
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_GRADIO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_API }}:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_GRADIO }}:latest

            docker stop finriskguard-api    2>/dev/null || true
            docker stop finriskguard-gradio 2>/dev/null || true
            docker rm   finriskguard-api    2>/dev/null || true
            docker rm   finriskguard-gradio 2>/dev/null || true

            docker run -d \
              --name finriskguard-api \
              --restart unless-stopped \
              -p 8000:8000 \
              -e PYTHONPATH=/app \
              ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_API }}:latest

            sleep 30
            curl -f http://localhost:8000/health || exit 1

            docker run -d \
              --name finriskguard-gradio \
              --restart unless-stopped \
              -p 7860:7860 \
              -e API_URL=http://localhost:8000 \
              ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_GRADIO }}:latest

            docker ps